<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0A0E1A;
  --surface:#111827;
  --surface2:#1a2235;
  --sidebar:#0D1424;
  --border:#1E293B;
  --border2:#2a3a52;
  --blue:#3B82F6;
  --blue-dim:#1d4ed8;
  --green:#10B981;
  --amber:#F59E0B;
  --red:#EF4444;
  --purple:#8B5CF6;
  --cyan:#06B6D4;
  --text:#F1F5F9;
  --text2:#94A3B8;
  --text3:#475569;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s;overflow:hidden;}
.sidebar.collapsed{width:60px;min-width:60px;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.logo-text{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;}
.logo-text span{color:var(--blue);}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-section{padding:6px 16px 2px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;overflow:hidden;}
.sidebar.collapsed .nav-section{opacity:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:0;transition:all .15s;position:relative;white-space:nowrap;}
.nav-item:hover{background:var(--surface);}
.nav-item.active{background:rgba(59,130,246,.12);border-right:2px solid var(--blue);}
.nav-item.active .nav-icon{color:var(--blue);}
.nav-item.active .nav-label{color:var(--text);}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;color:var(--text2);}
.nav-label{font-size:13px;font-weight:500;color:var(--text2);overflow:hidden;}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);}
.user-card{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;cursor:pointer;}
.user-card:hover{background:var(--surface);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.user-info{overflow:hidden;}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10px;color:var(--text3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--surface);flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:600;flex:1;}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.lang-toggle{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
.lang-toggle:hover{border-color:var(--blue);color:var(--blue);}
.search-bar{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:6px 12px;border-radius:8px;font-size:13px;width:200px;font-family:'Inter',sans-serif;outline:none;}
.search-bar:focus{border-color:var(--blue);}
.notif-btn{background:var(--surface2);border:1px solid var(--border2);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:15px;}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.content{flex:1;overflow-y:auto;padding:20px;}

/* CARDS & WIDGETS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.card-icon{font-size:18px;}
.stat-value{font-size:26px;font-weight:700;font-family:var(--mono);margin-bottom:2px;}
.stat-sub{font-size:11px;color:var(--text2);}
.stat-change{font-size:11px;font-weight:600;}
.stat-change.up{color:var(--green);}
.stat-change.down{color:var(--red);}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:10px 12px;color:var(--text2);}
tbody td:first-child{color:var(--text);font-weight:500;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-green{background:rgba(16,185,129,.12);color:var(--green);}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber);}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue);}
.badge-purple{background:rgba(139,92,246,.12);color:var(--purple);}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dim);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-sm{padding:4px 10px;font-size:12px;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:18px;width:fit-content;}
.tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3);}

/* AI CHAT */
.ai-chat{display:flex;flex-direction:column;height:100%;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
.msg-user{background:var(--blue);color:#fff;align-self:flex-end;border-radius:12px 12px 2px 12px;}
.msg-ai{background:var(--surface2);color:var(--text);align-self:flex-start;border-radius:12px 12px 12px 2px;border:1px solid var(--border2);}
.msg-ai-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;font-weight:600;color:var(--blue);}
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;}
.chat-input:focus{border-color:var(--blue);}
.ai-thinking{display:flex;align-items:center;gap:6px;color:var(--text3);font-size:12px;}
.dots span{animation:blink 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}

/* FORM */
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);}
.form-input,.form-select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--blue);}
.form-select option{background:var(--surface);}

/* INTEGRATIONS */
.int-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.int-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s;}
.int-card:hover{border-color:var(--blue);}
.int-header{display:flex;align-items:center;gap:10px;}
.int-logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.int-name{font-size:14px;font-weight:600;}
.int-desc{font-size:12px;color:var(--text2);line-height:1.4;}
.int-status{display:flex;align-items:center;justify-content:space-between;}
.toggle{width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;}
.toggle.on::after{left:18px;}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.inv-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;}
.inv-item:hover{border-color:var(--blue);transform:translateY(-1px);}
.inv-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.inv-item-name{font-size:13px;font-weight:600;}
.inv-item-cat{font-size:11px;color:var(--text3);}
.inv-bar-wrap{background:var(--border);border-radius:4px;height:4px;margin:8px 0;}
.inv-bar{height:4px;border-radius:4px;transition:width .3s;}
.inv-bar.high{background:var(--green);}
.inv-bar.med{background:var(--amber);}
.inv-bar.low{background:var(--red);}
.inv-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:520px;max-width:90vw;max-height:80vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{cursor:pointer;color:var(--text2);font-size:18px;background:none;border:none;color:var(--text2);}

/* SECTIONS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:700;}
.chart-container{height:200px;}

/* MINI CALENDAR STRIP */
.cal-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.cal-day{min-width:44px;height:58px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);transition:all .15s;}
.cal-day.has-order{border-color:var(--blue);}
.cal-day.today{background:rgba(59,130,246,.15);border-color:var(--blue);}
.cal-day-num{font-size:15px;font-weight:700;font-family:var(--mono);}
.cal-day-label{font-size:9px;color:var(--text3);text-transform:uppercase;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);}

.loading-bar{height:2px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--blue));background-size:200% 100%;animation:loading 1.5s infinite;}
@keyframes loading{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
</style>
</head>

    atrasado:{cls:'badge-red',es:'Atrasado',en:'Delayed'},

    disponible:{cls:'badge-green',es:'Disponible',en:'Available'},
  };
  const s=map[status]||{cls:'badge-blue',es:status,en:status};
  return <span className={`badge ${s.cls}`}>{lang==='es'?s.es:s.en}</span>;
}

// ── AI ASSISTANT MODULE ────────────────────────────────────
function AIAssistant({t}){
  const [msgs,setMsgs]=useState([
    {role:'ai',text:'¡Hola! Soy el asistente interno de NexERP. Puedo consultarte disponibilidad de inventario, analizar finanzas, revisar órdenes activas y darte recomendaciones. ¿En qué te ayudo?'},
  ]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  const buildContext=()=>`
Eres el asistente IA interno de NexERP, un ERP para negocios de renta (ARCOHN - andamios) y venta (Nautilus - libros) en Honduras.
Datos actuales del sistema:
INVENTARIO: ${JSON.stringify(MOCK.inventory.map(i=>({nombre:i.name,disponible:i.available,total:i.total,precio:i.price})))}
ÓRDENES ACTIVAS: ${JSON.stringify(MOCK.orders.filter(o=>o.status==='activo'))}
CLIENTES: ${JSON.stringify(MOCK.clients.map(c=>({nombre:c.name,estado:c.status,acumulado:c.total})))}
FINANZAS: Ingresos junio L 847,320 | Por cobrar L 124,500 | Margen 63.1%
Responde en español de forma concisa y útil. Usa emojis cuando ayude a la claridad.`;

  const send=async()=>{
    if(!input.trim()||loading)return;
    const userMsg=input.trim();
    setInput('');
    setMsgs(m=>[...m,{role:'user',text:userMsg}]);
    setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          system:buildContext(),
          messages:[
            ...msgs.filter(m=>m.role!=='ai'||msgs.indexOf(m)===0).slice(-6).map(m=>({
              role:m.role==='user'?'user':'assistant',
              content:m.text
            })),
            {role:'user',content:userMsg}
          ]
        })
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||'Error al obtener respuesta.';
      setMsgs(m=>[...m,{role:'ai',text:reply}]);
    }catch(e){
      setMsgs(m=>[...m,{role:'ai',text:'⚠️ Error de conexión. Verifica tu API key de Anthropic.'}]);
    }
    setLoading(false);
  };

  const suggestions=['¿Cuántos andamios tubulares disponibles?','¿Qué clientes tienen pagos atrasados?','¿Cuál fue el ingreso de mayo?','Recomienda qué cobrar primero'];

  return(
    <div style={{height:'calc(100vh - 140px)',display:'flex',flexDirection:'column'}}>
      <div className="section-header" style={{marginBottom:12}}>
        <span className="section-title">🤖 {t.ai}</span>
        <span style={{fontSize:11,color:'#10B981',fontWeight:600}}>● En línea · claude-sonnet-4-6</span>
      </div>
      {msgs.length===1&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {suggestions.map((s,i)=>(
            <button key={i} className="btn btn-ghost btn-sm" onClick={()=>{setInput(s);}} style={{fontSize:11}}>{s}</button>
          ))}
        </div>
      )}
      <div className="card" style={{flex:1,display:'flex',flexDirection:'column',padding:0,overflow:'hidden'}}>
        <div className="chat-messages" style={{flex:1,overflow:'auto'}}>
          {msgs.map((m,i)=>(
            <div key={i} className={`msg msg-${m.role}`}>
              {m.role==='ai'&&<div className="msg-ai-header">🤖 NexERP AI</div>}
              <div style={{whiteSpace:'pre-wrap',lineHeight:1.6}}>{m.text}</div>
            </div>
          ))}
          {loading&&(
            <div className="msg msg-ai">
              <div className="msg-ai-header">🤖 NexERP AI</div>
              <div className="ai-thinking">Analizando<span className="dots"><span>.</span><span>.</span><span>.</span></span></div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <div className="chat-input-area">
          <textarea
            className="chat-input"
            placeholder={t.aiPlaceholder}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            rows={2}
          />
          <button className="btn btn-primary" onClick={send} disabled={loading} style={{alignSelf:'flex-end'}}>
            {loading?'...':`${t.aiSend} ↑`}
          </button>
        </div>
      </div>
    </div>
  );
}

  return(
    <div>
      <div className="section-header">
        <span className="section-title">💳 {t.billing}</span>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm">⬇ Exportar PDF</button>
          <button className="btn btn-primary">+ Nueva Factura</button>
        </div>
      </div>
      <div className="grid-3" style={{marginBottom:16}}>
        {[
          {label:'Facturado este mes',val:'L 847,320',color:'#3B82F6',icon:'🧾'},
          {label:'Cobrado',val:'L 722,820',color:'#10B981',icon:'✅'},
          {label:'Pendiente de cobro',val:'L 124,500',color:'#F59E0B',icon:'⏳'},
        ].map((s,i)=>(
          <div className="card" key={i} style={{borderLeft:`3px solid ${s.color}`}}>
            <div className="card-header"><span className="card-title">{s.label}</span><span>{s.icon}</span></div>
            <div className="stat-value" style={{color:s.color,fontSize:20}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Facturas recientes</span></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Factura</th><th>{t.client}</th><th>Concepto</th><th>Emitida</th><th>Vence</th><th>Monto</th><th>{t.status}</th><th>Pago</th></tr></thead>
            <tbody>
              {MOCK.orders.map((o,i)=>(
                <tr key={i}>
                  <td><span style={{fontFamily:'JetBrains Mono,monospace',fontSize:12,color:'#3B82F6'}}>FAC-{2200+i}</span></td>
                  <td>{o.client}</td>
                  <td style={{fontSize:12}}>{o.type} — {o.items.slice(0,25)}...</td>
                  <td style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:'#94A3B8'}}>{o.start}</td>
                  <td style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:'#94A3B8'}}>{o.end==='—'?o.start:o.end}</td>
                  <td style={{fontFamily:'JetBrains Mono,monospace',fontWeight:600}}>{o.total}</td>
                  <td><StatusBadge status={o.status}/></td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <span style={{fontSize:10,color:'#94A3B8'}}>Pixel Pay</span>
                      <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',fontSize:10}}>🧾</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── APP ROOT ───────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState('es');
  const [module,setModule]=useState('dashboard');
  const [collapsed,setCollapsed]=useState(false);
  const t=T[lang];

  const navItems=[
    {id:'dashboard',icon:'⬛',label:t.dashboard,section:'principal'},
    {id:'inventory',icon:'📦',label:t.inventory,section:'operaciones'},
    {id:'orders',icon:'📋',label:t.orders,badge:'143',section:'operaciones'},
    {id:'clients',icon:'👥',label:t.clients,section:'operaciones'},
    {id:'billing',icon:'💳',label:t.billing,section:'operaciones'},
    {id:'reports',icon:'📊',label:t.reports,section:'analítica'},
    {id:'ai',icon:'🤖',label:t.ai,section:'analítica'},
    {id:'integrations',icon:'🔌',label:t.integrations,section:'sistema'},
  ];

  const sections=[...new Set(navItems.map(n=>n.section))];

  const moduleComponents={
    dashboard:<Dashboard t={t}/>,
    inventory:<Inventory t={t}/>,
    orders:<Orders t={t}/>,
    clients:<Clients t={t}/>,
    billing:<Billing t={t}/>,
    reports:<Reports t={t}/>,
    ai:<AIAssistant t={t}/>,
    integrations:<Integrations t={t}/>,
  };

  const currentTitle=navItems.find(n=>n.id===module)?.label||'';

  return(
    <div className="app">
      <div className={`sidebar${collapsed?' collapsed':''}`}>
        <div className="sidebar-logo">
          <div className="logo-icon">N</div>
          {!collapsed&&<div className="logo-text">Nex<span>ERP</span></div>}
        </div>
        <div className="sidebar-nav">
          {sections.map(sec=>(
            <div key={sec}>
              <div className="nav-section">{sec}</div>
              {navItems.filter(n=>n.section===sec).map(n=>(
                <div key={n.id} className={`nav-item${module===n.id?' active':''}`} onClick={()=>setModule(n.id)} title={collapsed?n.label:''}>
                  <span className="nav-icon">{n.icon}</span>
                  {!collapsed&&<span className="nav-label">{n.label}</span>}
                  {!collapsed&&n.badge&&<span className="nav-badge">{n.badge}</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">G</div>
            {!collapsed&&<div className="user-info"><div className="user-name">Gabu — ARCOHN</div><div className="user-role">Admin</div></div>}
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <button className="btn btn-ghost btn-sm" onClick={()=>setCollapsed(c=>!c)} style={{padding:'4px 8px'}}>{collapsed?'▶':'◀'}</button>
          <span className="topbar-title">{currentTitle}</span>
          <div className="topbar-actions">
            <input className="search-bar" placeholder={t.search}/>
            <button className="lang-toggle" onClick={()=>setLang(l=>l==='es'?'en':'es')}>
              {lang==='es'?'🌐 EN':'🌐 ES'}
            </button>
            <div className="notif-btn">🔔<div className="notif-dot"/></div>
          </div>
        </div>
        <div className="content">
          {moduleComponents[module]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
